<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>UNO Card</title>
    <style>
      body {
        background: #2c3e50;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }

      .card {
        width: 180px;
        height: 280px;
        border-radius: 20px;
        position: relative;
        color: white;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }

      /* Card Colors */
      .red {
        background: #e74c3c;
      }
      .green {
        background: #27ae60;
      }
      .blue {
        background: #2980b9;
      }
      .yellow {
        background: #f1c40f;
        color: black;
      }

      /* Center oval */
      .oval {
        position: absolute;
        width: 140%;
        height: 70%;
        background: white;
        border-radius: 50%;
        top: 15%;
        left: -20%;
        transform: rotate(-25deg);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .number {
        font-size: 80px;
        font-weight: bold;
        transform: rotate(25deg);
      }

      /* Corner numbers */
      .corner {
        position: absolute;
        font-size: 28px;
        font-weight: bold;
      }

      .top-left {
        top: 10px;
        left: 12px;
      }

      .bottom-right {
        bottom: 10px;
        right: 12px;
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body>
    <div class="card red">
      <div class="corner top-left">5</div>

      <div class="oval">
        <div class="number" style="color: #e74c3c">5</div>
      </div>

      <div class="corner bottom-right">5</div>
    </div>
  </body>
</html>
